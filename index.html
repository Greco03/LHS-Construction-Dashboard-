<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexington High School Building Project — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #003262;
    --navy-dark: #00244a;
    --navy-light: #0a4a8a;
    --accent: #c4a35a;
    --accent-light: #e8d5a0;
    --white: #ffffff;
    --off-white: #f4f5f7;
    --gray-100: #eceef1;
    --gray-200: #d4d8de;
    --gray-400: #8d95a0;
    --gray-600: #5a6270;
    --gray-800: #2d3340;
    --green: #1a8754;
    --green-bg: #e6f4ed;
    --amber: #b8860b;
    --amber-bg: #fef3d0;
    --blue-bg: #e1ecf7;
    --red: #c0392b;
    --red-bg: #fce4e4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--gray-800);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .dashboard { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
  .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--gray-100); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.9rem; color: var(--gray-400); }
  .error-msg { background: var(--red-bg); color: var(--red); padding: 20px 28px; border-radius: 12px; font-size: 0.9rem; text-align: center; }
  .header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 60%, #001a33 100%); border-radius: 16px; padding: 40px 44px 36px; color: var(--white); position: relative; overflow: hidden; margin-bottom: 28px; }
  .header::before { content: ''; position: absolute; top: -50%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(196,163,90,0.12) 0%, transparent 70%); pointer-events: none; }
  .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent)); }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.01em; line-height: 1.15; }
  .header h1 span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .updated { font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-top: 14px; font-weight: 500; }
  .header-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 20px; text-align: right; flex-shrink: 0; }
  .header-badge .label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 4px; }
  .header-badge .value { font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: var(--white); }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border-radius: 12px; padding: 22px 24px; border: 1px solid var(--gray-100); transition: box-shadow 0.25s; }
  .stat-card:hover { box-shadow: 0 4px 20px rgba(0,50,98,0.08); }
  .stat-card .label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; }
  .stat-card .value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--navy); }
  .stat-card .sub { font-size: 0.78rem; color: var(--gray-400); margin-top: 4px; }
  .section { background: var(--white); border-radius: 14px; border: 1px solid var(--gray-100); margin-bottom: 24px; overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px 18px; border-bottom: 1px solid var(--gray-100); }
  .section-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; font-weight: 400; color: var(--navy); }
  .section-header .pill { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; background: var(--blue-bg); color: var(--navy); }
  .section-body { padding: 20px 28px 28px; }
  .budget-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .budget-table thead th { text-align: left; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); padding: 0 12px 12px; border-bottom: 2px solid var(--gray-100); }
  .budget-table thead th:not(:first-child) { text-align: right; }
  .budget-table tbody td { padding: 14px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .budget-table tbody td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
  .budget-table tbody tr:last-child td { border-bottom: none; }
  .budget-table .row-total td { font-weight: 700; color: var(--navy); border-top: 2px solid var(--navy); border-bottom: none; padding-top: 16px; }
  .cat-name { font-weight: 500; color: var(--gray-800); }
  .type-badge { display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
  .type-badge.gmp { background: var(--navy); color: var(--white); }
  .type-badge.soft { background: var(--gray-100); color: var(--gray-600); }
  .progress-track { width: 100%; height: 8px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .progress-fill.navy { background: var(--navy); }
  .progress-fill.green { background: var(--green); }
  .progress-fill.amber { background: var(--amber); }
  .progress-fill.accent { background: var(--accent); }
  .status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
  .status.complete { background: var(--green-bg); color: var(--green); }
  .status.in-progress { background: var(--amber-bg); color: var(--amber); }
  .status.upcoming { background: var(--gray-100); color: var(--gray-400); }
  .status.pre-bid { background: var(--blue-bg); color: var(--navy-light); }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .phase-list { display: flex; flex-direction: column; gap: 14px; }
  .phase-item { display: grid; grid-template-columns: 200px 1fr 90px 80px; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
  .phase-item:last-child { border-bottom: none; }
  .phase-name { font-weight: 600; font-size: 0.88rem; color: var(--gray-800); }
  .phase-dates { font-size: 0.78rem; color: var(--gray-400); text-align: right; }
  .phase-pct { font-size: 0.82rem; font-weight: 700; color: var(--navy); text-align: right; font-variant-numeric: tabular-nums; }
  .milestone-list { display: flex; flex-direction: column; }
  .milestone-item { display: grid; grid-template-columns: 130px 1fr 100px; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--gray-100); }
  .milestone-item:last-child { border-bottom: none; }
  .milestone-date { font-size: 0.82rem; font-weight: 600; color: var(--navy); font-variant-numeric: tabular-nums; }
  .milestone-name { font-size: 0.88rem; color: var(--gray-800); }
  .pkg-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
  .pkg-table thead th { text-align: left; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); padding: 0 10px 12px; border-bottom: 2px solid var(--gray-100); }
  .pkg-table thead th:nth-child(n+2):not(:last-child) { text-align: right; }
  .pkg-table tbody td { padding: 14px 10px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .pkg-table tbody td:nth-child(n+2):nth-child(-n+4) { text-align: right; font-variant-numeric: tabular-nums; }
  .pkg-table tbody tr:last-child td { border-bottom: none; }
  .pkg-table .row-total td { font-weight: 700; color: var(--navy); border-top: 2px solid var(--navy); border-bottom: none; }
  .donut-section { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .donut-container { width: 200px; height: 200px; flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.84rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .legend-label { color: var(--gray-600); }
  .legend-value { font-weight: 700; color: var(--gray-800); margin-left: auto; font-variant-numeric: tabular-nums; }
  .sub-section-title { font-family: 'DM Serif Display', serif; font-size: 0.95rem; color: var(--navy); margin: 28px 0 14px; padding-top: 20px; border-top: 1px solid var(--gray-100); }
  .sub-section-title:first-of-type { margin-top: 0; border-top: none; padding-top: 0; }
  .footer { text-align: center; padding: 24px; font-size: 0.75rem; color: var(--gray-400); }
  .footer a { color: var(--navy); text-decoration: none; }
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .phase-item { grid-template-columns: 1fr 1fr; gap: 8px; }
    .milestone-item { grid-template-columns: 110px 1fr 90px; }
  }
  @media (max-width: 600px) {
    .dashboard { padding: 16px 12px 40px; }
    .header { padding: 28px 24px 24px; border-radius: 12px; }
    .header h1 { font-size: 1.5rem; }
    .stats-row { grid-template-columns: 1fr; }
    .section-body { padding: 16px 18px 22px; }
    .budget-table, .pkg-table { font-size: 0.8rem; }
    .donut-section { flex-direction: column; align-items: flex-start; }
    .phase-item { grid-template-columns: 1fr; }
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both; }
  .delay-1 { animation-delay: 0.08s; } .delay-2 { animation-delay: 0.16s; } .delay-3 { animation-delay: 0.24s; }
  .delay-4 { animation-delay: 0.32s; } .delay-5 { animation-delay: 0.40s; } .delay-6 { animation-delay: 0.48s; }
</style>
</head>
<body>
<div class="dashboard" id="dashboard">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading dashboard data…</div>
  </div>
</div>
<script>
var SHEET_ID = '1ksZV7TgmVz5jwudp085qSdpoPPgdgCU2';
var TABS = {
  budget: 'Budget by Category',
  packages: 'Construction Packages',
  schedule: 'Project Schedule',
  milestones: 'Key Milestones'
};

// Uses Google Visualization API — works with "Anyone with the link" sharing
// Returns CALCULATED values for formulas (not formula text)
function fetchSheet(tabName) {
  return new Promise(function(resolve, reject) {
    var callbackName = 'cb_' + Math.random().toString(36).substr(2, 9);
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
      '/gviz/tq?tqx=out:json;responseHandler:' + callbackName +
      '&sheet=' + encodeURIComponent(tabName);

    window[callbackName] = function(response) {
      delete window[callbackName];
      document.body.removeChild(script);
      if (response.status === 'error') {
        reject(new Error('Failed to load ' + tabName));
        return;
      }
      var rows = [];
      var table = response.table;
      for (var r = 0; r < table.rows.length; r++) {
        var row = [];
        for (var c = 0; c < table.rows[r].c.length; c++) {
          var cell = table.rows[r].c[c];
          if (cell === null || cell.v === null || typeof cell.v === 'undefined') {
            row.push('');
          } else {
            // Use formatted value for dates/strings, raw value for numbers
            if (typeof cell.v === 'number') {
              row.push(cell.v);
            } else if (cell.f) {
              row.push(cell.f);
            } else {
              row.push(cell.v);
            }
          }
        }
        rows.push(row);
      }
      resolve(rows);
    };

    var script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
      delete window[callbackName];
      document.body.removeChild(script);
      reject(new Error('Network error loading ' + tabName));
    };
    document.body.appendChild(script);
  });
}

function fmt(n) { var v = parseFloat(n); return isNaN(v) ? '—' : '$' + Math.round(v).toLocaleString('en-US'); }
function fmtM(n) { var v = parseFloat(n); if (isNaN(v)) return '—'; if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B'; if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M'; if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K'; return '$' + v.toLocaleString('en-US'); }
function pct(n) { var v = parseFloat(n); return isNaN(v) ? '0%' : (v * 100).toFixed(1) + '%'; }
function pctN(n) { var v = parseFloat(n); return isNaN(v) ? 0 : v * 100; }
function sCls(s) { if (!s) return 'upcoming'; var l = s.toString().toLowerCase().trim(); if (l === 'complete') return 'complete'; if (l === 'in progress') return 'in-progress'; if (l === 'pre-bid') return 'pre-bid'; return 'upcoming'; }
function pCol(p) { if (p >= 100) return 'green'; if (p >= 40) return 'amber'; if (p > 0) return 'accent'; return 'navy'; }
function tBadge(t) { if (!t) return ''; return t.toString().toLowerCase().includes('gmp') ? '<span class="type-badge gmp">GMP</span>' : '<span class="type-badge soft">Soft</span>'; }
function val(v) { if (v === '' || v === null || typeof v === 'undefined') return ''; return v; }

async function build() {
  var el = document.getElementById('dashboard');
  try {
    var results = await Promise.all([
      fetchSheet(TABS.budget),
      fetchSheet(TABS.packages),
      fetchSheet(TABS.schedule),
      fetchSheet(TABS.milestones)
    ]);
    var bRaw = results[0], pkRaw = results[1], sRaw = results[2], mRaw = results[3];

    // Budget
    var bStart = 0;
    for (var i = 0; i < bRaw.length; i++) {
      var cell = val(bRaw[i][0]).toString().toLowerCase();
      if (cell.includes('category')) { bStart = i + 1; break; }
    }
    var bRows = [], bTotal = null;
    for (var i = bStart; i < bRaw.length; i++) {
      var r = bRaw[i];
      var name = val(r[0]).toString().trim();
      if (!name) continue;
      if (name.toUpperCase() === 'TOTAL') bTotal = r;
      else bRows.push(r);
    }
    var totBudget = bTotal ? parseFloat(bTotal[1]) : 0;
    var totSpent = bTotal ? parseFloat(bTotal[2]) : 0;
    var totRem = bTotal ? parseFloat(bTotal[3]) : 0;
    var totPct = bTotal ? parseFloat(bTotal[4]) : 0;

    // Packages
    var pStart = 0;
    for (var i = 0; i < pkRaw.length; i++) {
      var cell = val(pkRaw[i][0]).toString().toLowerCase();
      if (cell.includes('package')) { pStart = i + 1; break; }
    }
    var pRows = [], pTotal = null;
    for (var i = pStart; i < pkRaw.length; i++) {
      var r = pkRaw[i];
      var name = val(r[0]).toString().trim();
      if (!name) continue;
      if (name.toUpperCase() === 'TOTAL') pTotal = r;
      else pRows.push(r);
    }

    // Schedule
    var sPhases = [], sP1 = [], sP2 = [], sec = null;
    for (var i = 0; i < sRaw.length; i++) {
      var row = sRaw[i];
      var c = val(row[0]).toString().toUpperCase().trim();
      if (c.includes('PROJECT PHASES') || c === 'PHASE') { sec = 'phases'; continue; }
      if (c.includes('PHASE 1') || c.includes('CONSTRUCTION SCHEDULE')) {
        if (!sec || sec === 'phases') { sec = 'p1'; continue; }
        else { sec = 'p2'; continue; }
      }
      if (c.includes('PHASE 2')) { sec = 'p2'; continue; }
      if (c === 'ACTIVITY' || !val(row[0]).toString().trim() || c === 'PROJECT SCHEDULE') continue;
      var item = {
        name: val(row[0]),
        start: val(row[1]),
        end: val(row[2]),
        status: val(row[3]),
        pct: row[4] !== '' ? row[4] : 0
      };
      if (sec === 'phases') sPhases.push(item);
      else if (sec === 'p1') sP1.push(item);
      else if (sec === 'p2') sP2.push(item);
    }

    // Milestones
    var mStart = 0;
    for (var i = 0; i < mRaw.length; i++) {
      var cell = val(mRaw[i][0]).toString().toLowerCase();
      if (cell.includes('date')) { mStart = i + 1; break; }
    }
    var ms = [];
    for (var i = mStart; i < mRaw.length; i++) {
      var r = mRaw[i];
      if (!val(r[0]).toString().trim()) continue;
      ms.push({ date: val(r[0]), name: val(r[1]), status: val(r[2]) });
    }

    // Current phase
    var curPhase = 'Upcoming', curPct = 0;
    for (var j = 0; j < sPhases.length; j++) {
      if (val(sPhases[j].status).toString().toLowerCase().trim() === 'in progress') {
        curPhase = sPhases[j].name;
        curPct = pctN(sPhases[j].pct);
        break;
      }
    }
    var targetComp = ms.length > 0 ? ms[ms.length - 1].date : 'TBD';

    // Donut
    var gmpR = bRows.find(function(r) { return val(r[0]).toString().toLowerCase().includes('construction budget'); });
    var gmpV = gmpR ? parseFloat(gmpR[1]) : 0;
    var aeR = bRows.find(function(r) { return val(r[0]).toString().toLowerCase().includes('a/e'); });
    var aeV = aeR ? parseFloat(aeR[1]) : 0;
    var adR = bRows.find(function(r) { return val(r[0]).toString().toLowerCase().includes('administration'); });
    var adV = adR ? parseFloat(adR[1]) : 0;
    var ffR = bRows.find(function(r) { var n = val(r[0]).toString().toLowerCase(); return n.includes('ff&e') || n.includes('ffe') || n.includes('ff\\u0026e') || n.includes('technology'); });
    var ffV = ffR ? parseFloat(ffR[1]) : 0;
    var otV = totBudget - gmpV - aeV - adV - ffV;
    var gmpPct = totBudget > 0 ? ((gmpV / totBudget) * 100).toFixed(1) : 0;
    var CC = 2 * Math.PI * 75;
    var segs = [{v:gmpV,c:'#003262'},{v:aeV,c:'#0a4a8a'},{v:adV,c:'#c4a35a'},{v:ffV,c:'#e8d5a0'},{v:otV,c:'#8d95a0'}];
    var dSVG = '', off = CC * 0.25;
    for (var s = 0; s < segs.length; s++) {
      var d = totBudget > 0 ? (segs[s].v / totBudget) * CC : 0;
      dSVG += '<circle cx="100" cy="100" r="75" fill="none" stroke="' + segs[s].c + '" stroke-width="28" stroke-dasharray="' + d + ' ' + (CC-d) + '" stroke-dashoffset="' + off + '" />';
      off -= d;
    }

    var now = new Date();
    var mon = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var upd = mon[now.getMonth()] + ' ' + now.getFullYear();

    // Build table HTML
    var budgetHTML = '';
    for (var i = 0; i < bRows.length; i++) {
      var r = bRows[i]; var p = pctN(r[4]);
      budgetHTML += '<tr><td><span class="cat-name">' + val(r[0]) + '</span>' + tBadge(r[5]) + '</td><td>' + fmt(r[1]) + '</td><td>' + fmt(r[2]) + '</td><td>' + fmt(r[3]) + '</td><td><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end"><span style="font-size:0.78rem;color:' + (p>=100?'var(--green)':'var(--gray-400)') + '">' + pct(r[4]) + '</span><div class="progress-track" style="width:80px"><div class="progress-fill ' + pCol(p) + '" style="width:' + Math.min(p,100) + '%"></div></div></div></td></tr>';
    }
    if (bTotal) {
      budgetHTML += '<tr class="row-total"><td>Total</td><td>' + fmt(bTotal[1]) + '</td><td>' + fmt(bTotal[2]) + '</td><td>' + fmt(bTotal[3]) + '</td><td><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end"><span style="font-size:0.78rem;font-weight:700;color:var(--navy)">' + pct(bTotal[4]) + '</span><div class="progress-track" style="width:80px"><div class="progress-fill navy" style="width:' + Math.min(pctN(bTotal[4]),100) + '%"></div></div></div></td></tr>';
    }

    var pkgHTML = '';
    for (var i = 0; i < pRows.length; i++) {
      var r = pRows[i];
      var v = (r[2] !== '' && r[3] !== '' && !isNaN(parseFloat(r[3]))) ? parseFloat(r[3]) : null;
      var vs = v !== null ? (v >= 0 ? '<span style="color:var(--green)">+' + fmt(v) + '</span>' : '<span style="color:var(--red)">' + fmt(v) + '</span>') : '—';
      pkgHTML += '<tr><td style="font-weight:500">' + val(r[0]) + '</td><td>' + fmt(r[1]) + '</td><td>' + (r[2] !== '' && !isNaN(parseFloat(r[2])) ? fmt(r[2]) : '—') + '</td><td>' + vs + '</td><td>' + (val(r[4]) || '—') + '</td><td><span class="status ' + sCls(r[5]) + '">' + (val(r[5]) || 'Upcoming') + '</span></td></tr>';
    }
    if (pTotal) {
      pkgHTML += '<tr class="row-total"><td>Total</td><td>' + fmt(pTotal[1]) + '</td><td>' + (pTotal[2] !== '' && !isNaN(parseFloat(pTotal[2])) ? fmt(pTotal[2]) : '—') + '</td><td></td><td></td><td></td></tr>';
    }

    function phaseHTML(arr, showDates) {
      var h = '';
      for (var i = 0; i < arr.length; i++) {
        var p = arr[i]; var v = pctN(p.pct);
        h += '<div class="phase-item"><div class="phase-name">' + val(p.name) + '</div><div><div class="progress-track"><div class="progress-fill ' + pCol(v) + '" style="width:' + Math.min(v,100) + '%"></div></div></div>';
        if (showDates) { h += '<div class="phase-dates">' + val(p.start) + (val(p.end) ? '–' + val(p.end) : '') + '</div>'; }
        else { h += '<div class="phase-pct">' + v.toFixed(0) + '%</div>'; }
        h += '<div><span class="status ' + sCls(p.status) + '">' + val(p.status) + '</span></div></div>';
      }
      return h;
    }

    var msHTML = '';
    for (var i = 0; i < ms.length; i++) {
      msHTML += '<div class="milestone-item"><div class="milestone-date">' + ms[i].date + '</div><div class="milestone-name">' + ms[i].name + '</div><div><span class="status ' + sCls(ms[i].status) + '">' + ms[i].status + '</span></div></div>';
    }

    el.innerHTML =
      '<div class="header animate-in"><div class="header-top"><div><h1><span>Lexington Public Schools</span>Lexington High School<br>Building Project</h1><div class="updated">Data refreshed: ' + upd + '</div></div><div class="header-badge"><div class="label">Total Project Budget</div><div class="value">' + fmtM(totBudget) + '</div></div></div></div>' +
      '<div class="stats-row">' +
      '<div class="stat-card animate-in delay-1"><div class="label">Spent to Date</div><div class="value">' + fmtM(totSpent) + '</div><div class="sub">' + pct(totPct) + ' of total budget</div></div>' +
      '<div class="stat-card animate-in delay-2"><div class="label">Remaining</div><div class="value">' + fmtM(totRem) + '</div><div class="sub">' + (100-pctN(totPct)).toFixed(1) + '% of total budget</div></div>' +
      '<div class="stat-card animate-in delay-3"><div class="label">Current Phase</div><div class="value" style="font-size:1.15rem">' + curPhase + '</div><div class="sub">' + curPct.toFixed(0) + '% complete</div></div>' +
      '<div class="stat-card animate-in delay-4"><div class="label">Target Completion</div><div class="value" style="font-size:1.15rem">' + targetComp + '</div><div class="sub">Site complete</div></div>' +
      '</div>' +
      '<div class="section animate-in delay-3"><div class="section-header"><h2>Budget Allocation</h2><span class="pill">' + fmtM(totBudget) + ' Total</span></div><div class="section-body"><div class="donut-section"><div class="donut-container"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' + dSVG + '<text x="100" y="94" text-anchor="middle" font-family="DM Serif Display,serif" font-size="22" fill="#003262">' + gmpPct + '%</text><text x="100" y="114" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#8d95a0">Construction</text></svg></div><div class="donut-legend">' +
      '<div class="legend-item"><div class="legend-swatch" style="background:#003262"></div><span class="legend-label">Construction (GMP)</span><span class="legend-value">' + fmtM(gmpV) + '</span></div>' +
      '<div class="legend-item"><div class="legend-swatch" style="background:#0a4a8a"></div><span class="legend-label">A/E Services</span><span class="legend-value">' + fmtM(aeV) + '</span></div>' +
      '<div class="legend-item"><div class="legend-swatch" style="background:#c4a35a"></div><span class="legend-label">Administration (OPM)</span><span class="legend-value">' + fmtM(adV) + '</span></div>' +
      '<div class="legend-item"><div class="legend-swatch" style="background:#e8d5a0"></div><span class="legend-label">FF&amp;E / Technology</span><span class="legend-value">' + fmtM(ffV) + '</span></div>' +
      '<div class="legend-item"><div class="legend-swatch" style="background:#8d95a0"></div><span class="legend-label">Other (Misc, Feasibility, Contingency, CM)</span><span class="legend-value">' + fmtM(otV) + '</span></div>' +
      '</div></div></div></div>' +
      '<div class="section animate-in delay-4"><div class="section-header"><h2>Budget by Category</h2></div><div class="section-body" style="overflow-x:auto"><table class="budget-table"><thead><tr><th>Category</th><th>Budget</th><th>Spent</th><th>Remaining</th><th style="width:120px">% Spent</th></tr></thead><tbody>' + budgetHTML + '</tbody></table></div></div>' +
      '<div class="section animate-in delay-5"><div class="section-header"><h2>Construction Packages</h2><span class="pill">Budget vs Actual</span></div><div class="section-body" style="overflow-x:auto"><table class="pkg-table"><thead><tr><th>Package</th><th>Budget</th><th>Actual</th><th>Variance</th><th>Bid Date</th><th>Status</th></tr></thead><tbody>' + pkgHTML + '</tbody></table></div></div>' +
      '<div class="section animate-in delay-5"><div class="section-header"><h2>Project Schedule</h2></div><div class="section-body">' +
      '<div class="sub-section-title">Project Phases</div><div class="phase-list">' + phaseHTML(sPhases, false) + '</div>' +
      (sP1.length ? '<div class="sub-section-title">Construction Phase 1</div><div class="phase-list">' + phaseHTML(sP1, true) + '</div>' : '') +
      (sP2.length ? '<div class="sub-section-title">Phase 2 — Site &amp; Demo</div><div class="phase-list">' + phaseHTML(sP2, true) + '</div>' : '') +
      '</div></div>' +
      '<div class="section animate-in delay-6"><div class="section-header"><h2>Key Procurement Milestones</h2></div><div class="section-body"><div class="milestone-list">' + msHTML + '</div></div></div>' +
      '<div class="footer">Lexington High School Building Project &middot; Lexington Public Schools &middot; Lexington, MA<br>For questions, visit <a href="https://lps.lexingtonma.org" target="_blank">lps.lexingtonma.org</a></div>';

  } catch (err) {
    el.innerHTML = '<div class="error-msg"><strong>Unable to load dashboard data.</strong><br>Please ensure the Google Sheet is shared as "Anyone with the link can view."<br><small style="opacity:0.7;margin-top:8px;display:block">' + err.message + '</small></div>';
  }
}
build();
</script>
</body>
</html>
