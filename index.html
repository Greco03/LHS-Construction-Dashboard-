<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexington High School Building Project — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#003262;--navy-dark:#00244a;--navy-light:#0a4a8a;--accent:#c4a35a;--accent-light:#e8d5a0;--white:#fff;--off-white:#f4f5f7;--gray-50:#f8f9fb;--gray-100:#eceef1;--gray-200:#d4d8de;--gray-300:#b8bec8;--gray-400:#8d95a0;--gray-600:#5a6270;--gray-800:#2d3340;--green:#1a8754;--green-bg:#e6f4ed;--amber:#b8860b;--amber-bg:#fef3d0;--blue-bg:#e1ecf7;--red:#c0392b;--red-bg:#fce4e4}
  *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--gray-800);line-height:1.55;-webkit-font-smoothing:antialiased}
  .dashboard{max-width:1240px;margin:0 auto;padding:32px 24px 64px}.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px}.spinner{width:40px;height:40px;border:4px solid var(--gray-100);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:.9rem;color:var(--gray-400)}.error-msg{background:var(--red-bg);color:var(--red);padding:24px 32px;border-radius:14px;font-size:.92rem;text-align:center;line-height:1.7}
  .header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 60%,#001a33 100%);border-radius:18px;padding:44px 48px 40px;color:var(--white);position:relative;overflow:hidden;margin-bottom:28px}.header::before{content:'';position:absolute;top:-60%;right:-12%;width:560px;height:560px;background:radial-gradient(circle,rgba(196,163,90,.10) 0%,transparent 70%);pointer-events:none}.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent-light),var(--accent))}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}.header h1{font-family:'DM Serif Display',serif;font-size:2.1rem;font-weight:400;letter-spacing:-.01em;line-height:1.15}.header h1 span{display:block;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}.updated{font-size:.78rem;color:rgba(255,255,255,.50);margin-top:16px;font-weight:500}.header-badges{display:flex;gap:14px;flex-shrink:0;flex-wrap:wrap}.header-badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:16px 22px;text-align:right;min-width:150px}.header-badge .label{font-size:.68rem;letter-spacing:.10em;text-transform:uppercase;color:var(--accent-light);margin-bottom:4px}.header-badge .value{font-family:'DM Serif Display',serif;font-size:1.55rem;color:var(--white)}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}.stat-card{background:var(--white);border-radius:14px;padding:24px 26px;border:1px solid var(--gray-100);transition:box-shadow .25s}.stat-card:hover{box-shadow:0 6px 24px rgba(0,50,98,.07)}.stat-card .label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:8px}.stat-card .value{font-family:'DM Serif Display',serif;font-size:1.55rem;color:var(--navy)}.stat-card .sub{font-size:.78rem;color:var(--gray-400);margin-top:5px}
  .status-pill{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:6px;white-space:nowrap}.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}.status-pill.complete{background:var(--green-bg);color:var(--green)}.status-pill.in-progress{background:var(--amber-bg);color:var(--amber)}.status-pill.upcoming{background:var(--gray-100);color:var(--gray-400)}.status-pill.pre-bid{background:var(--blue-bg);color:var(--navy-light)}.status-pill.on-schedule{background:var(--green-bg);color:var(--green)}.status-pill.on-budget{background:var(--green-bg);color:var(--green)}.status-pill.below-goal{background:var(--red-bg);color:var(--red)}.status-pill.meeting-goal,.status-pill.above-goal{background:var(--green-bg);color:var(--green)}
  .section{background:var(--white);border-radius:16px;border:1px solid var(--gray-100);margin-bottom:24px;overflow:hidden}.section-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 18px;border-bottom:1px solid var(--gray-100);gap:12px;flex-wrap:wrap}.section-header h2{font-family:'DM Serif Display',serif;font-size:1.18rem;font-weight:400;color:var(--navy)}.section-header .pill{font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 14px;border-radius:99px;background:var(--blue-bg);color:var(--navy);white-space:nowrap}.section-body{padding:22px 28px 28px}.sub-title{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--navy);margin:28px 0 14px;padding-top:20px;border-top:1px solid var(--gray-100)}.sub-title:first-child,.sub-title:first-of-type{margin-top:0;border-top:none;padding-top:0}
  .donut-section{display:flex;align-items:center;gap:40px;flex-wrap:wrap}.donut-container{width:210px;height:210px;flex-shrink:0}.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;min-width:200px}.legend-item{display:flex;align-items:center;gap:10px;font-size:.84rem}.legend-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}.legend-label{color:var(--gray-600)}.legend-value{font-weight:700;color:var(--gray-800);margin-left:auto;font-variant-numeric:tabular-nums}
  .data-table{width:100%;border-collapse:collapse;font-size:.86rem}.data-table thead th{text-align:left;font-size:.70rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);padding:0 12px 12px;border-bottom:2px solid var(--gray-100);white-space:nowrap}.data-table thead th:not(:first-child){text-align:right}.data-table tbody td{padding:14px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}.data-table tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}.data-table tbody tr:last-child td{border-bottom:none}.data-table .row-total td{font-weight:700;color:var(--navy);border-top:2px solid var(--navy);border-bottom:none;padding-top:16px}
  .progress-track{width:100%;height:8px;background:var(--gray-100);border-radius:99px;overflow:hidden}.progress-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.22,1,.36,1)}.fill-navy{background:var(--navy)}.fill-green{background:var(--green)}.fill-amber{background:var(--amber)}.fill-accent{background:var(--accent)}
  .phase-list{display:flex;flex-direction:column;gap:2px}.phase-item{display:grid;grid-template-columns:200px 1fr 100px 100px;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid var(--gray-100)}.phase-item:last-child{border-bottom:none}.phase-name{font-weight:600;font-size:.86rem;color:var(--gray-800)}.phase-dates{font-size:.78rem;color:var(--gray-400);text-align:right}.phase-pct{font-size:.82rem;font-weight:700;color:var(--navy);text-align:right;font-variant-numeric:tabular-nums}
  .milestone-list{display:flex;flex-direction:column}.milestone-item{display:grid;grid-template-columns:140px 1fr 110px;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--gray-100)}.milestone-item:last-child{border-bottom:none}.milestone-date{font-size:.82rem;font-weight:600;color:var(--navy);font-variant-numeric:tabular-nums}.milestone-name{font-size:.86rem;color:var(--gray-800)}
  .qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.qa-card{border:1px solid var(--gray-100);border-radius:12px;padding:20px 22px}.qa-card .qa-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:6px}.qa-card .qa-total{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--navy);margin-bottom:8px}.qa-row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0}.qa-row .open-label{color:var(--gray-600)}.qa-row .open-val{font-weight:600;color:var(--gray-800)}
  .mbe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.mbe-card{border:1px solid var(--gray-100);border-radius:12px;padding:20px 22px}.mbe-card .mbe-type{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--navy);margin-bottom:10px}.mbe-row{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;color:var(--gray-600)}.mbe-row .mbe-val{font-weight:600;color:var(--gray-800)}.mbe-card .mbe-status{margin-top:10px}
  .contingency-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.contingency-card{border:1px solid var(--gray-100);border-radius:12px;padding:20px 22px}.contingency-card .c-label{font-size:.78rem;font-weight:600;color:var(--gray-800);margin-bottom:4px}.contingency-card .c-value{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:3px}.contingency-card .c-sub{font-size:.76rem;color:var(--gray-400);margin-bottom:8px}
  .highlights-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.highlight-card{border:1px solid var(--gray-100);border-radius:12px;padding:22px 24px}.highlight-card .h-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.highlight-card .h-label.moment{color:var(--accent)}.highlight-card .h-label.challenge{color:var(--amber)}.highlight-card .h-label.positive{color:var(--green)}.highlight-card p{font-size:.84rem;color:var(--gray-600);line-height:1.6}
  .links-row{display:flex;gap:14px;flex-wrap:wrap}.link-btn{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:var(--white);text-decoration:none;padding:12px 22px;border-radius:10px;font-size:.84rem;font-weight:600;transition:background .2s}.link-btn:hover{background:var(--navy-light)}.link-btn svg{width:16px;height:16px}
  .type-badge{display:inline-block;font-size:.64rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}.type-badge.gmp{background:var(--navy);color:var(--white)}.type-badge.soft{background:var(--gray-100);color:var(--gray-600)}
  .footer{text-align:center;padding:28px;font-size:.75rem;color:var(--gray-400)}.footer a{color:var(--navy);text-decoration:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.30s}.d6{animation-delay:.36s}.d7{animation-delay:.42s}.d8{animation-delay:.48s}.d9{animation-delay:.54s}.d10{animation-delay:.60s}
  @media(max-width:960px){.stats-row{grid-template-columns:repeat(2,1fr)}.qa-grid,.mbe-grid,.contingency-grid,.highlights-grid{grid-template-columns:1fr}.phase-item{grid-template-columns:1fr 1fr;gap:8px}}
  @media(max-width:600px){.dashboard{padding:16px 12px 40px}.header{padding:28px 22px 24px;border-radius:12px}.header h1{font-size:1.5rem}.stats-row{grid-template-columns:1fr}.section-body{padding:16px 18px 22px}.data-table{font-size:.78rem}.donut-section{flex-direction:column;align-items:flex-start}.phase-item{grid-template-columns:1fr}.milestone-item{grid-template-columns:1fr;gap:4px}.header-badges{flex-direction:column}}
  .debug-panel{background:#1a1a2e;color:#0f0;padding:16px;border-radius:8px;margin-bottom:24px;font-family:monospace;font-size:.72rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;display:none}.debug-toggle{background:var(--gray-100);border:none;padding:6px 14px;border-radius:6px;font-size:.72rem;cursor:pointer;color:var(--gray-600);margin-bottom:12px}
</style>
</head>
<body>
<div class="dashboard" id="dashboard">
  <div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text">Loading dashboard data…</div></div>
</div>
<script>
var SHEET_ID='16tykM9z5Zl_obS_HtaSCVjVdOq6RNGBp';
var TABS={main:'DASHBOARD V2',schedule:'Schedule Overview',budget:'Budget Overview',qaqc:'QA-QC Summary',mbe:'MBE-WBE'};
var debugLog=[];function log(m){debugLog.push('['+new Date().toISOString().substr(11,8)+'] '+m)}
function fetchSheet(tabName){return new Promise(function(resolve,reject){var cb='cb_'+Math.random().toString(36).substr(2,9);var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json;responseHandler:'+cb+'&sheet='+encodeURIComponent(tabName);window[cb]=function(resp){delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);if(resp.status==='error'){reject(new Error('Sheet error: '+tabName));return}var t=resp.table,rows=[];var nc=t.cols.length;for(var r=0;r<t.rows.length;r++){var row=[];for(var c=0;c<nc;c++){var cell=(t.rows[r].c&&t.rows[r].c[c])?t.rows[r].c[c]:null;if(!cell)row.push({v:null,f:null});else row.push({v:cell.v!==undefined?cell.v:null,f:cell.f||null})}rows.push(row)}log('Loaded: '+tabName+' ('+rows.length+' rows, '+nc+' cols)');resolve(rows)};var script=document.createElement('script');script.src=url;script.onerror=function(){delete window[cb];reject(new Error('Network error: '+tabName))};document.body.appendChild(script)})}

function getNum(c){if(!c)return NaN;if(typeof c.v==='number')return c.v;if(c.v!=null){var p=parseFloat(String(c.v).replace(/[$,%\s]/g,''));if(!isNaN(p))return p}if(c.f){var p2=parseFloat(String(c.f).replace(/[$,%\s]/g,''));if(!isNaN(p2))return p2}return NaN}
function getStr(c){if(!c)return'';if(c.f)return String(c.f);if(c.v!=null)return String(c.v);return''}
function getPct(c){if(!c)return 0;if(c.f&&String(c.f).includes('%')){var n=parseFloat(String(c.f).replace('%',''));if(!isNaN(n))return n}var n2=typeof c.v==='number'?c.v:parseFloat(String(c.v));if(isNaN(n2))return 0;if(n2>0&&n2<=1)return n2*100;return n2}
function fmt$(v){if(isNaN(v))return'—';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtM(v){if(isNaN(v))return'—';if(Math.abs(v)>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtPct(v,d){return v.toFixed(d!==undefined?d:1)+'%'}
function pCol(p){if(p>=100)return'fill-green';if(p>=40)return'fill-amber';if(p>0)return'fill-accent';return'fill-navy'}
function sCls(s){if(!s)return'upcoming';var l=s.toLowerCase().trim();if(l==='complete'||l==='completed')return'complete';if(l==='in progress')return'in-progress';if(l==='pre-bid')return'pre-bid';if(l==='on schedule')return'on-schedule';if(l==='on budget')return'on-budget';if(l.includes('below'))return'below-goal';if(l.includes('above')||l.includes('meeting'))return'meeting-goal';return'upcoming'}

// LABEL-BASED SEARCH — resilient to row/col shifts
function safe(rows,r,c){if(r>=0&&r<rows.length&&c>=0&&c<rows[r].length)return rows[r][c];return null}
function findRow(rows,label,col){var lbl=label.toLowerCase();for(var i=0;i<rows.length;i++){var s=getStr(safe(rows,i,col)).toLowerCase();if(s.includes(lbl))return i}return-1}
function findCell(rows,label,sCol,vCol){var i=findRow(rows,label,sCol);return i>=0?safe(rows,i,vCol):null}
// Search ANY column for a label, return the row index
function findRowAny(rows,label){var lbl=label.toLowerCase();for(var i=0;i<rows.length;i++){for(var c=0;c<rows[i].length;c++){if(getStr(safe(rows,i,c)).toLowerCase().includes(lbl))return{row:i,col:c}}}return null}

async function build(){
  var el=document.getElementById('dashboard');
  try{
    var results=await Promise.all([fetchSheet(TABS.main),fetchSheet(TABS.schedule),fetchSheet(TABS.budget),fetchSheet(TABS.qaqc),fetchSheet(TABS.mbe)]);
    var main=results[0],sched=results[1],budget=results[2],qaqc=results[3],mbeTab=results[4];

    // Debug: log first rows of main
    for(var rr=0;rr<Math.min(8,main.length);rr++){var vals=[];for(var cc=0;cc<Math.min(23,main[rr].length);cc++){vals.push(cc+':'+getStr(safe(main,rr,cc)).substr(0,25))}log('main['+rr+']: '+vals.join(' | '))}

    // ═══ DASHBOARD V2 — all label-based ═══
    var scheduleStatus=getStr(findCell(main,'schedule status',1,2))||'ON SCHEDULE';
    var budgetStatus=getStr(findCell(main,'budget status',1,2))||'ON BUDGET';

    // Financials — search col 18 for labels, values in col 20
    var totalBudget=getNum(findCell(main,'total project budget',18,20));
    // Fallback: search any column
    if(isNaN(totalBudget)){var tb=findRowAny(main,'total project budget');if(tb)totalBudget=getNum(safe(main,tb.row,tb.col+2))}
    var gmpValue=getNum(findCell(main,'gmp value',18,20));
    if(isNaN(gmpValue)){var gv=findRowAny(main,'gmp value');if(gv)gmpValue=getNum(safe(main,gv.row,gv.col+2))}
    if(isNaN(gmpValue))gmpValue=534130000;
    var billedTotal=getNum(findCell(main,'billed to-date',18,20));
    if(isNaN(billedTotal)){var bt=findRowAny(main,'billed to-date');if(bt)billedTotal=getNum(safe(main,bt.row,bt.col+2))}
    var spentToDate=getNum(findCell(main,'spent to-date',1,2));
    if(isNaN(spentToDate))spentToDate=billedTotal||0;
    if(isNaN(spentToDate))spentToDate=10620812;
    var remaining=getNum(findCell(main,'remaining',1,2));
    if(isNaN(remaining)&&!isNaN(totalBudget))remaining=totalBudget-spentToDate;
    var softCosts=totalBudget-gmpValue;
    var spentPct=totalBudget>0?(spentToDate/totalBudget)*100:0;

    log('FINANCIALS: total='+totalBudget+' gmp='+gmpValue+' spent='+spentToDate);

    // Contingencies — search col 18
    function getContingency(label){var r=findRow(main,label,18);if(r<0){var f=findRowAny(main,label);if(f)r=f.row;else return{label:label,total:0,utilized:0,remaining:0,rate:0}}return{label:getStr(safe(main,r,18))||label,total:getNum(safe(main,r,19)),utilized:getNum(safe(main,r,20))||0,remaining:getNum(safe(main,r,21)),rate:getNum(safe(main,r,22))||0}}
    var contingencies=[getContingency("cm's contingency"),getContingency("owner's contingency"),getContingency("holds"),getContingency("allowances")];

    // Phases — find last "Phase" header in col 10
    var phases=[];var phaseHeaders=[];
    for(var i=0;i<main.length;i++){var c10=getStr(safe(main,i,10)).toUpperCase().trim();if(c10==='PHASE'||c10==='PROJECT PHASES')phaseHeaders.push(i)}
    var phaseStart=phaseHeaders.length>0?phaseHeaders[phaseHeaders.length-1]:-1;
    if(phaseStart>=0){for(var i=phaseStart+1;i<main.length;i++){var pn=getStr(safe(main,i,10)).trim();if(!pn)break;phases.push({name:pn,start:getStr(safe(main,i,11)),end:getStr(safe(main,i,12)),status:getStr(safe(main,i,13)),pct:getPct(safe(main,i,14))})}}
    log('PHASES: '+phases.length+' from row '+phaseStart);

    var curPhase='Upcoming',curPct=0;
    for(var j=0;j<phases.length;j++){if(phases[j].status.toLowerCase().includes('in progress')){curPhase=phases[j].name;curPct=phases[j].pct;break}}

    // P1 Activities
    var p1Activities=[];var p1Hdr=findRow(main,'construction schedule - phase 1',10);
    if(p1Hdr<0)p1Hdr=findRow(main,'construction schedule',10);
    if(p1Hdr>=0){var si=p1Hdr+1;if(getStr(safe(main,si,10)).toLowerCase().includes('activity'))si++;for(var i=si;i<main.length;i++){var an=getStr(safe(main,i,10)).trim();if(!an)break;if(an.toUpperCase().includes('CONSTRUCTION SCHEDULE')||an.toUpperCase().includes('PROJECT PHASES'))break;p1Activities.push({name:an,start:getStr(safe(main,i,12)),end:getStr(safe(main,i,13)),pct:getPct(safe(main,i,14))})}}
    log('P1: '+p1Activities.length);

    // P2 Activities
    var p2Activities=[];var p2Hdr=findRow(main,'construction schedule - phase 2',10);
    if(p2Hdr>=0){var si2=p2Hdr+1;if(getStr(safe(main,si2,10)).toLowerCase().includes('activity'))si2++;for(var i=si2;i<main.length;i++){var an2=getStr(safe(main,i,10)).trim();if(!an2)break;if(an2.toUpperCase().includes('PROJECT PHASES'))break;p2Activities.push({name:an2,start:getStr(safe(main,i,12)),end:getStr(safe(main,i,13)),pct:getPct(safe(main,i,14))})}}
    log('P2: '+p2Activities.length);

    // QA/QC from main or qaqc tab
    function qVal(label){var c=findCell(main,label,1,3);if(c&&!isNaN(getNum(c)))return getNum(c);c=findCell(qaqc,label,1,2);if(c&&!isNaN(getNum(c)))return getNum(c);return 0}
    var totalRFIs=qVal('total rfis'),totalSubmittals=qVal('total submittals'),totalDesignUpd=qVal('total design');
    var rfiRow=findRow(main,'total rfis',1);if(rfiRow<0)rfiRow=findRow(qaqc,'total rfis',1);
    var openRFIs=0,closedRFIs=0;
    if(rfiRow>=0){var src=findRow(main,'total rfis',1)>=0?main:qaqc;var vc=findRow(main,'total rfis',1)>=0?3:2;openRFIs=getNum(safe(src,rfiRow+1,vc))||0;closedRFIs=getNum(safe(src,rfiRow+2,vc))||0}
